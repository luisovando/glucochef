services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: glucochef
      POSTGRES_PASSWORD: glucochef
      POSTGRES_DB: glucochef
    ports:
      - "5432:5432"
    volumes:
      - glucochef_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glucochef"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  glucochef_pg:
